<!DOCTYPE html>
<html>

<head>

<title>Captcha Gate</title>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>

function unlockPage() {

    var response = grecaptcha.getResponse();

    if(response.length == 0) {

        alert("Please complete captcha");

    } else {

        window.location.href =
        "https://www.vaxomedia.com/intro";

    }

}

</script>

</head>

<body>

<h2>Verify First</h2>

<div class="g-recaptcha"
data-sitekey="6LdoIucsAAAAAFnW7Uxp9HBXPoUqjLPDoO053O1Q">
</div>

<br>

<button type="button"
onclick="unlockPage()">

Continue

</button>

</body>
</html>
